---
name: dev-branch
on:
    push:
        branches:
            - dev
permissions:
  checks: write        # ← needed to create check runs
  contents: read       # ← needed to read the repo
  pull-requests: write # ← needed to post PR comments
  security-events: write # ← this is what CodeQL needs
jobs:
    maven-build-job:
        runs-on: ubuntu-latest
        steps:
            - name: get the code
              uses: actions/checkout@v4
            - name: steup java
              uses: actions/setup-java@v4
              with:
                java-version: 21
                distribution: 'temurin'
            - name: initilize codeql
              uses: github/codeql-action/init@v4
              with:
                languages: java
            - name: packeing the code
              run: mvn --batch-mode  -Dmaven.test.failure.ignore=true test package
            - name: perform code quality analyis
              uses: github/codeql-action/analyze@v4
            - name: publish test results
              uses: EnricoMi/publish-unit-test-result-action@v2
              with:
                files: "**/target/surefire-reports/**/*.xml"
                comment_mode: always
            - name: upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: spring-petclinic jar file
                path: target/*.jar
    docker-build-job:
        runs-on: ubuntu-latest
        steps:
            - name: get the code
              uses: actions/checkout@v6
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: build docker image
              uses: docker/build-push-action@v7
              with:
                push: false
                tags: "murali96-devops-labs/springpetclinic:latest"        
        